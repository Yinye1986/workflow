monitor = DP-1, 2560x1440@170.00101, 0x0, 1
monitor = eDP-1, 2560x1660@120.001, 0x0, 1.7
monitor=,preferred,auto,auto


$term = alacritty
$menu = fuzzel
$cliphist = cliphist list | fuzzel --dmenu --with-nth 2 | cliphist decode | wl-copy
$fileManager = dolphin
# scripts
$btop = alacritty --title 'btop' --option 'window.dimensions.columns=88' --option 'window.dimensions.lines=24' --command 'btop'
$browser = firefox


exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = wl-paste --watch cliphist store
exec-once = fcitx5 -d

# 4
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
source = /const/workflow/homeDir/dotConfig/hypr/config.d/env.conf

# 5

# 6
source = /const/workflow/homeDir/dotConfig/hypr/config.d/style.conf

# 7
source = /const/workflow/homeDir/dotConfig/hypr/config.d/input.conf

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
bind = $mainMod CTRL, Q, exit

bind = $mainMod SHIFT, Return, exec, $term
bind = $mainMod, D, exec, $menu
bind = $mainMod, V, exec, $cliphist
bind = $mainMod SHIFT, Q, killactive,

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, M, togglefloating,
bind = $mainMod, M, togglesplit,

bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod SHIFT, P, pseudo, # dwindle


# Move focus with mainMod + arrow keys
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, U, movefocus, u
bind = $mainMod, E, movefocus, d
bind = $mainMod, N, movefocus, l
bind = $mainMod, I, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# F1-F12
bind = $mainMod, F1, exec, $filemgr
bind = $mainMod, F2, exec, $screenShot
bind = $mainMod, F3, exec, $browser
bind = $mainMod, F4, exec, $office
bind = $mainMod, F5, exec, hyprctl reload
bind = $mainMod, F6, exec, killall -SIGUSR2 waybar
bind = $mainMod, F7, movetoworkspace, 7
bind = $mainMod, F8, movetoworkspace, 8
bind = $mainMod, F9, movetoworkspace, 9
# bind = $mainMod, F10, exec,
bind = $mainMod, F11, movetoworkspace, 10
bind = $mainMod, F12, exec, hyprlock
# 功能键
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, $switchSinks
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-


# Move/resize windows with mainMod + LMB/RMB and dragging

# Laptop multimedia keys for volume and LCD brightness


windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
source = /const/workflow/homeDir/dotConfig/hypr/config.d/windowrule.conf
